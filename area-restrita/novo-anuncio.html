<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novo anúncio — VeloCidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="painel.html" class="logo" aria-label="VeloCidade, painel do anunciante">
      <span class="logo-plate">VC</span>
      <span class="logo-word">Velo<strong>Cidade</strong></span>
      <span class="area-tag">Área do anunciante</span>
    </a>
    <nav class="nav" aria-label="Navegação da área restrita">
      <a href="painel.html">Painel</a>
      <a href="novo-anuncio.html">Novo anúncio</a>
      <a href="meus-anuncios.html">Meus anúncios</a>
      <a href="../login.html" class="nav-sair">Sair</a>
    </nav>
  </div>
</header>

<main>
  <section class="container" style="padding-top:2rem;">
    <h1>Novo anúncio de veículo</h1>
    <p>Preencha os dados do veículo. Todos os campos são obrigatórios.</p>

    <form class="form" style="margin-top:1.5rem;" onsubmit="return false;">
      <div class="field">
        <label for="marca">Marca</label>
        <input type="text" id="marca" name="marca" placeholder="Ex: Chevrolet" required>
      </div>
      <div class="field">
        <label for="modelo">Modelo</label>
        <input type="text" id="modelo" name="modelo" placeholder="Ex: Onix" required>
      </div>
      <div class="field">
        <label for="ano">Ano de fabricação</label>
        <input type="number" id="ano" name="ano" min="1970" max="2026" placeholder="2022" required>
      </div>
      <div class="field">
        <label for="cor">Cor</label>
        <input type="text" id="cor" name="cor" placeholder="Ex: Prata" required>
      </div>
      <div class="field">
        <label for="km">Quilometragem</label>
        <input type="number" id="km" name="km" min="0" placeholder="Ex: 32500" required>
      </div>
      <div class="field">
        <label for="valor">Valor (R$)</label>
        <input type="number" id="valor" name="valor" min="0" step="0.01" placeholder="Ex: 68900.00" required>
      </div>
      <div class="field">
        <label for="estado">Estado</label>
        <select id="estado" name="estado" required>
          <option value="">Selecione</option>
          <option>MG</option>
          <option>SP</option>
          <option>RJ</option>
          <option>GO</option>
          <option>ES</option>
        </select>
      </div>
      <div class="field">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" name="cidade" placeholder="Ex: Uberlândia" required>
      </div>

      <div class="field field-full">
        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="4" placeholder="Conte mais sobre o veículo: histórico, revisões, itens de série..." required></textarea>
      </div>

      <fieldset>
        <legend>Fotos do veículo (mínimo 3)</legend>
        <div class="photo-upload-group">
          <div class="field">
            <label for="foto1">Foto 1</label>
            <input type="file" id="foto1" name="foto1" accept="image/*" required>
          </div>
          <div class="field">
            <label for="foto2">Foto 2</label>
            <input type="file" id="foto2" name="foto2" accept="image/*" required>
          </div>
          <div class="field">
            <label for="foto3">Foto 3</label>
            <input type="file" id="foto3" name="foto3" accept="image/*" required>
          </div>
        </div>
      </fieldset>

      <div class="field field-full">
        <button type="submit" class="btn btn-primary">Publicar anúncio</button>
      </div>
    </form>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>&copy; 2026 VeloCidade — Portal de anúncios de veículos.</p>
    <nav aria-label="Links do rodapé">
      <a href="painel.html">Painel</a>
      <a href="novo-anuncio.html">Novo anúncio</a>
      <a href="meus-anuncios.html">Meus anúncios</a>
    </nav>
  </div>
</footer>

</body>
</html>
